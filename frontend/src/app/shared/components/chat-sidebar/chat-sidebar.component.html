<!-- Overlay -->
<div *ngIf="isOpen" 
     class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[9998] transition-opacity"
     (click)="close()">
</div>

<!-- Floating Card Panel -->
<div class="fixed right-4 bottom-4 top-20 w-96 max-h-[75vh] bg-white/95 backdrop-blur-sm shadow-2xl z-[9999] rounded-[2rem] border border-white/20 transform transition-all duration-300 ease-in-out flex flex-col overflow-hidden"
     [class.translate-y-0]="isOpen" 
     [class.opacity-100]="isOpen"
     [class.translate-y-10]="!isOpen"
     [class.opacity-0]="!isOpen"
     [class.pointer-events-none]="!isOpen">
  
  <!-- Header -->
  <div class="bg-ecuavip-blue text-white p-5 flex justify-between items-center shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center backdrop-blur-md">
        <svg *ngIf="tipoReceptor === 'admin'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <svg *ngIf="tipoReceptor === 'chofer'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.5 2.6C2.1 10.3 2 10.6 2 11v5c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>
      </div>
      <div>
        <h3 class="font-black text-base leading-tight tracking-tight">{{ tituloCabecera }}</h3>
        <div class="flex items-center gap-1.5 mt-0.5">
          <span class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></span>
          <p class="text-white/80 text-[9px] font-black uppercase tracking-wider">Conectado</p>
        </div>
      </div>
    </div>
    <button (click)="close()" class="w-8 h-8 flex items-center justify-center hover:bg-white/20 rounded-xl transition-colors text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <!-- Messages Area -->
  <div #scrollContainer class="flex-1 overflow-y-auto p-5 bg-gray-50/50 flex flex-col gap-4 scroll-smooth">
    
    <div *ngIf="mensajes.length === 0" class="flex flex-col items-center justify-center h-full text-gray-400 space-y-4">
      <div class="w-16 h-16 rounded-[1.5rem] bg-white shadow-xl flex items-center justify-center">
        <span class="text-2xl animate-bounce">💬</span>
      </div>
      <div class="text-center">
        <p class="text-xs font-black text-gray-900 uppercase tracking-widest">¿Cómo podemos ayudar?</p>
      </div>
    </div>

    <!-- Message Bubbles -->
    <div *ngFor="let m of mensajes" class="flex flex-col" [ngClass]="{'items-end': m.remitente_id === miId, 'items-start': m.remitente_id !== miId}">
      <div class="max-w-[85%] rounded-2xl px-4 py-3 shadow-sm text-sm leading-relaxed"
           [ngClass]="{
             'bg-ecuavip-blue text-white rounded-br-none font-medium': m.remitente_id === miId,
             'bg-white border border-gray-100 text-gray-700 rounded-bl-none': m.remitente_id !== miId
           }">
        {{ m.contenido }}
      </div>
      <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest mt-1.5 px-1">
        {{ m.timestamp | date:'shortTime' }}
      </span>
    </div>
    
  </div>

  <!-- Quick Replies -->
  <div *ngIf="respuestasRapidas.length > 0" class="px-5 py-2 bg-white border-t border-gray-50 flex gap-2 overflow-x-auto no-scrollbar scroll-smooth">
    <button *ngFor="let res of respuestasRapidas" 
            (click)="enviarRespuestaRapida(res)"
            class="whitespace-nowrap px-4 py-2 bg-gray-100 text-gray-700 rounded-full text-[10px] font-black uppercase tracking-wider hover:bg-ecuavip-blue hover:text-white transition-all active:scale-95 border border-gray-200">
      {{ res }}
    </button>
  </div>

  <!-- Input Area -->
  <div class="p-4 bg-white border-t border-gray-100/50 backdrop-blur-md">
    <div class="flex items-center gap-2 bg-gray-50 rounded-2xl p-1 pr-2 border border-transparent focus-within:border-ecuavip-blue/30 focus-within:ring-4 focus-within:ring-ecuavip-blue/5 transition-all">
      <input type="text" 
             [(ngModel)]="nuevoMensaje" 
             (keyup.enter)="enviarMensaje()"
             placeholder="Escribe tu mensaje..."
             class="flex-1 bg-transparent border-none focus:ring-0 px-4 py-2.5 text-sm text-gray-800 font-medium placeholder-gray-400">
      <button (click)="enviarMensaje()" 
              [disabled]="!nuevoMensaje.trim()"
              class="w-10 h-10 rounded-xl bg-ecuavip-blue text-white flex items-center justify-center disabled:opacity-30 disabled:grayscale transition-all hover:scale-105 hover:bg-blue-700 shadow-lg shadow-blue-600/20 active:scale-95">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="ml-1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>
</div>
