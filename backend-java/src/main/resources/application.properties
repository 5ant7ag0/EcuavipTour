# ===================================================================
# Core Application Configuration
# ===================================================================

# Server Port Configuration
server.port=5001

# Default active profile for local development (loads application-local.properties if present)
spring.profiles.active=local

# Supabase PostgreSQL Configuration (Secured with Env Variables + Fallbacks)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecuaviptour}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# SQL Execution Debug Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=trace

# Application JWT Configuration
jwt.secret=${JWT_SECRET:default_ecuavip_jwt_signing_key_32_chars_long_placeholder}

# CORS Allowed Origins Configuration (Highly scalable and manageable)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173}

# File Upload Limit Configuration (For high-res phone payment receipts)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Socket.IO Host Configuration (For stable macOS local development)
app.socket.host=127.0.0.1


