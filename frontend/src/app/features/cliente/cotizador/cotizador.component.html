<div class="h-screen md:h-[calc(100vh-96px)] w-full flex flex-col overflow-hidden bg-gray-50/50">
  
  <!-- Navigation Tabs Header (Apple Style) -->
  <div class="bg-white border-b border-gray-100 py-3.5 px-6 shrink-0 z-20 shadow-sm flex items-center justify-between flex-wrap gap-4">
    <div>
      <h1 class="text-xl font-black text-gray-900 tracking-tight">Viajes Ecuavip</h1>
    </div>
    
    <!-- Tab Selector -->
    <div class="flex p-1 bg-gray-100 rounded-2xl max-w-md w-full sm:w-96 shrink-0">
      <button 
        (click)="setActiveTab('shared')"
        [class.bg-white]="activeTab === 'shared'"
        [class.shadow-sm]="activeTab === 'shared'"
        [class.text-gray-900]="activeTab === 'shared'"
        [class.text-gray-500]="activeTab !== 'shared'"
        class="flex-1 py-2 px-3 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider focus:outline-none"
      >
        Compartido
      </button>
      <button 
        (click)="setActiveTab('express')"
        [class.bg-white]="activeTab === 'express'"
        [class.shadow-sm]="activeTab === 'express'"
        [class.text-gray-900]="activeTab === 'express'"
        [class.text-gray-500]="activeTab !== 'express'"
        class="flex-1 py-2 px-3 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider focus:outline-none"
      >
        Expres
      </button>
      <button 
        (click)="setActiveTab('my-trips')"
        [class.bg-white]="activeTab === 'my-trips'"
        [class.shadow-sm]="activeTab === 'my-trips'"
        [class.text-gray-900]="activeTab === 'my-trips'"
        [class.text-gray-500]="activeTab !== 'my-trips'"
        class="flex-1 py-2 px-3 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider focus:outline-none"
      >
        Mis Viajes
      </button>
    </div>
  </div>

  <!-- Content Area -->
  <div class="flex-1 min-h-0 relative overflow-hidden flex flex-col">
    
    <!-- TAB 1: VIAJE COMPARTIDO (SUBCOMPONENTE ENCAPSULADO) -->
    <ng-container *ngIf="activeTab === 'shared'">
      <div class="flex-1 overflow-y-auto block h-full bg-gray-50/50">
        <app-viaje-compartido-cartelera></app-viaje-compartido-cartelera>
      </div>
    </ng-container>

    <!-- TAB 2: VIAJE EXPRÉS (MAPA ORIGINAL RESTAURADO SIN TABS INTERNOS) -->
    <ng-container *ngIf="activeTab === 'express'">
      <div class="relative w-full h-full">

        <!-- Google Map Background -->
        <google-map 
          height="100%" 
          width="100%" 
          [center]="center" 
          [zoom]="zoom" 
          [options]="options"
          (mapClick)="onMapClick($event)">
          <map-directions-renderer *ngIf="(directionsResults$ | async) as results" [directions]="results"></map-directions-renderer>
          <map-marker *ngIf="origenLocation && !destinoLocation" [position]="origenLocation"></map-marker>
          <map-marker *ngIf="origenLocation && destinoLocation" [position]="origenLocation"></map-marker>
          <map-marker *ngIf="destinoLocation" [position]="destinoLocation"></map-marker>
        </google-map>

        <!-- Floating UI Overlay -->
        <div class="absolute top-0 left-0 w-full md:w-[450px] h-full p-4 pb-20 md:p-8 pointer-events-none z-10 flex flex-col justify-end md:justify-center">
          
          <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-sm p-6 pointer-events-auto border border-ecuavip-light/50 max-h-full overflow-y-auto">
            
            <div class="flex items-center justify-between mb-6">
              <h1 class="text-xl md:text-2xl font-extrabold text-ecuavip-dark tracking-tight">{{ getTitulo() }}</h1>
              <button *ngIf="origenAddress || destinoAddress" (click)="limpiar()" class="text-sm text-gray-400 hover:text-red-500 transition-colors font-medium flex items-center gap-1" title="Limpiar ruta">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                Limpiar
              </button>
            </div>

            <!-- Inputs -->
            <div class="relative flex flex-col gap-4 mb-6">
              <div class="absolute left-4 top-6 bottom-6 w-0.5 bg-gray-200"></div>

              <!-- Origen -->
              <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-ecuavip-blue z-10 shadow-sm border border-white"></div>
                <input 
                  #origenInput
                  type="text" 
                  [(ngModel)]="origenAddress"
                  placeholder="Punto de Recogida" 
                  class="flex-1 bg-gray-50/80 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ecuavip-blue/50 transition-all text-gray-700 font-medium placeholder-gray-400"
                >
              </div>

              <!-- Destino -->
              <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-sm bg-gray-900 z-10 shadow-sm border border-white"></div>
                <input 
                  #destinoInput
                  type="text" 
                  [(ngModel)]="destinoAddress"
                  placeholder="Destino" 
                  class="flex-1 bg-gray-50/80 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-ecuavip-blue/50 transition-all text-gray-700 font-medium placeholder-gray-400"
                >
              </div>
            </div>

            <!-- Results (If route is calculated) -->
            <div *ngIf="distanciaKm > 0" class="animate-fade-in-up">
              
              <!-- Opciones de Pasajeros -->
              <div class="mb-4 bg-gray-50 rounded-xl p-4 border border-gray-100">
                <div class="flex items-center justify-between mb-3">
                  <span class="text-sm font-bold text-gray-700">Pasajeros</span>
                  <div class="flex items-center gap-3 bg-white rounded-lg border border-gray-200 p-1">
                    <button (click)="decrementarPasajeros()" class="w-6 h-6 flex items-center justify-center bg-gray-100 rounded-md hover:bg-gray-200">-</button>
                    <span class="text-sm font-bold w-4 text-center">{{ numPasajeros }}</span>
                    <button (click)="incrementarPasajeros()" class="w-6 h-6 flex items-center justify-center bg-ecuavip-light text-ecuavip-blue rounded-md hover:bg-blue-100">+</button>
                  </div>
                </div>
                <div class="flex items-center justify-between">
                  <span class="text-sm font-bold text-gray-700">Hora de salida</span>
                  <select [(ngModel)]="horaSalida" class="bg-white border border-gray-200 rounded-lg text-sm px-3 py-1 focus:outline-none focus:ring-1 focus:ring-ecuavip-blue">
                    <option *ngFor="let hora of horariosDisponibles" [value]="hora">{{ hora }}</option>
                  </select>
                </div>
              </div>

              <!-- Total Quote -->
              <div *ngIf="cotizacionActual" class="flex items-end justify-between px-2 mb-2">
                <div>
                  <p class="text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">Total a pagar</p>
                  <p class="text-3xl font-extrabold text-ecuavip-dark">
                    ${{ cotizacionActual.precio_total | number:'1.2-2' }}
                  </p>
                </div>
                <div class="text-right">
                   <p class="text-xs font-bold text-gray-400">{{ distanciaKm | number:'1.1-1' }} KM • ~{{ tiempoEstimado }}</p>
                   <p *ngIf="numPasajeros > 1" class="text-xs text-ecuavip-blue font-bold mt-1">${{ cotizacionActual.precio_unitario | number:'1.2-2' }} c/u</p>
                </div>
              </div>

              <button (click)="reservar()" [disabled]="!cotizacionActual" class="w-full mt-4 bg-ecuavip-blue text-white font-bold py-4 rounded-xl shadow-[0_8px_20px_-4px_rgba(0,82,204,0.5)] hover:bg-ecuavip-dark hover:shadow-[0_12px_24px_-6px_rgba(0,51,128,0.6)] transition-all transform hover:-translate-y-0.5 active:translate-y-0 disabled:opacity-50 disabled:cursor-not-allowed">
                Confirmar Reserva
              </button>
            </div>

          </div>
        </div>
      </div>

      <app-auth-modal 
        *ngIf="showAuthModal" 
        (onSuccess)="onAuthSuccess()" 
        (onClose)="showAuthModal = false">
      </app-auth-modal>
    </ng-container>

    <!-- TAB 3: HISTORIAL DE MIS VIAGES (COMPONENT INTEGRADO) -->
    <ng-container *ngIf="activeTab === 'my-trips'">
      <div class="flex-1 overflow-y-auto block h-full bg-slate-50">
        <app-mis-viajes></app-mis-viajes>
      </div>
    </ng-container>
  </div>
</div>
